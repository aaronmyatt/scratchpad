# ──────────────────────────────────────────────────────────────────────────────
# lefthook.yml — git hooks for Scratchpad (owned by TASK-39).
#
# What runs:
#   - swift test on every commit (pure-logic regressions; ~3-5s on warm cache).
#   - shellcheck on staged shell files (catches shell footguns before they
#     reach the artifact pipeline).
#
# What does NOT run here:
#   - bats Tests/install.bats — ~25s (includes a release-mode swift build);
#     too slow for every-commit cadence. Lives in scripts/preflight-release.sh
#     instead and runs before tagging a release.
#   - plutil -lint — no version-controlled Info.plist exists; the plist is
#     generated by scripts/build-app.sh from a heredoc, so there's nothing
#     to lint here.
#
# Why lefthook (and not pre-commit framework / plain git hooks):
#   - Single-binary install, declarative YAML, runs commands in parallel out
#     of the box. ~3-5s pre-commit on a Mac is "feels instant"; the
#     pre-commit framework's Python venv warmup adds ~1s of fixed overhead.
#   - Plain .git/hooks/pre-commit scripts work but need a separate install
#     step and have no built-in parallelism — not worth the savings.
#
# Install (one-time, after `brew install lefthook shellcheck`):
#   lefthook install
#
# Bypass for a specific commit (standard git behaviour — called out per
# TASK-39 AC#4 so future-us doesn't second-guess):
#   git commit --no-verify
#
# Refs:
#   - lefthook docs:     https://lefthook.dev/configuration/
#   - shellcheck:        https://www.shellcheck.net/
#   - swift test:        https://www.swift.org/documentation/package-manager/#testing
# ──────────────────────────────────────────────────────────────────────────────

pre-commit:
  # Parallel: swift test and shellcheck have no shared state and finish in
  # different time windows; running them concurrently halves wall time.
  parallel: true
  commands:
    swift-test:
      # No glob — swift test is cheap enough on warm cache to run on every
      # commit. The Tests/ScratchpadTests target is small (~10 files) so the
      # build is near-instant; the test run itself is the long pole at ~1s.
      run: swift test
    shellcheck:
      # Glob gates shellcheck to commits that actually touch shell. The
      # {staged_files} substitution narrows to *staged* matching files (not
      # the whole glob), so editing one script only checks that one script.
      # Ref: https://lefthook.dev/configuration/run.html#staged_files
      glob: "{scripts/*.sh,install.sh}"
      run: shellcheck {staged_files}
